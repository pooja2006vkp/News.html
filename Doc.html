<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#1e88e5;
color:white;
padding:15px;
text-align:center;
}

.search-box{
display:flex;
justify-content:center;
margin:20px;
}

.search-box input{
padding:10px;
width:60%;
border-radius:5px 0 0 5px;
border:1px solid #ccc;
}

.search-box button{
padding:10px 20px;
border:none;
background:#1e88e5;
color:white;
border-radius:0 5px 5px 0;
cursor:pointer;
}

.news-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin:0 0 10px 0;
}

.card-content p{
font-size:14px;
color:#555;
}

.card-content a{
display:inline-block;
margin-top:10px;
color:#1e88e5;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>📰 Daily News</h1>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search news...">
<button onclick="searchNews()">Search</button>
</div>

<div class="news-container" id="news"></div>

<script>

const apiKey = "0284bde182f9451f83c9b7c7602a4129";

function getNews(query="india"){
fetch(`https://newsapi.org/v2/everything?q=${query}&apiKey=${apiKey}`)
.then(res => res.json())
.then(data => {

let newsHTML = "";

data.articles.forEach(article => {

newsHTML += `
<div class="card">
<img src="${article.urlToImage || ''}">
<div class="card-content">
<h3>${article.title}</h3>
<p>${article.description || ''}</p>
<a href="${article.url}" target="_blank">Read More</a>
</div>
</div>
`;

});

document.getElementById("news").innerHTML = newsHTML;

});

}

function searchNews(){
const query = document.getElementById("search").value;
getNews(query);
}

getNews();

</script>

</body>
</html>
